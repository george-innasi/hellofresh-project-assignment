  other:     { title:"Something else", quick:null, chips:[], photoLabel:"Add a photo or proof", photoHint:"", team:"the right team" },
};
const PROBLEMS = ["Not fresh","Wilted / soft","Bruised / damaged","Spoiled / moldy","Too small","Wrong / missing"];
const UNUSABLE = ["Spoiled / moldy","Wrong / missing"];
const OUTCOMES = {
  full:    { label:"Full meal credit",         color:C.green,    note:"A meal-defining ingredient made the dish uncookable, so the full meal value is credited plus a small goodwill amount for the inconvenience.", verify:true },
  partial: { label:"Partial credit",           color:C.amber,    note:"A key ingredient was usable but below standard, so a partial credit is applied.", verify:true },
  micro:   { label:"Micro-credit",             color:C.greenMid, note:"A supporting ingredient was unusable, but the dish was still cookable, so it is credited at the ingredient's value.", verify:false },
  token:   { label:"Logged, no credit needed", color:C.gray,     note:"A supporting ingredient was slightly below standard. It is logged and routed to the right team; no credit is required.", verify:false },
};
function compensationOutcome(recipe, bad, issues, missing){
  let cu=false, cd=false, su=false, criticalCount=0;
  (bad||[]).forEach(n=>{
    const ing = recipe && recipe.ingredients.find(i=>i.name===n);
    const crit = !!(ing && ing.critical);
    if(crit) criticalCount++;
    const tags = (issues && issues[n]) || [];
    const unusable = tags.some(t=>UNUSABLE.includes(t));
    const sev = unusable?2:(tags.length?1:0);
    if(crit && sev===2) cu=true; else if(crit && sev>=1) cd=true; else if(!crit && sev===2) su=true;
  });
  (missing||[]).forEach(n=>{
    const ing = recipe && recipe.ingredients.find(i=>i.name===n);
    const crit = !!(ing && ing.critical);
    if(crit){ cu=true; criticalCount++; } else { su=true; }
  });
  const cumulative = ((bad||[]).length + (missing||[]).length)>=3 || criticalCount>=2;
  if(cu || cumulative) return OUTCOMES.full;
  if(cd) return OUTCOMES.partial;
  if(su) return OUTCOMES.micro;
  return OUTCOMES.token;
}

  const [ratings,setRatings] = useState({});
  const [detail,setDetail] = useState({picks:[],photo:false,note:""});
  const [missing,setMissing] = useState([]);
  const [missingNote,setMissingNote] = useState("");

  const startReport = (r)=>{ setRecipe(r); setIssue(null); setBad([]); setIssues({}); setDetail({picks:[],photo:false,note:""}); setMissing([]); setMissingNote(""); setScreen("issue"); };
  const chooseIssue = (t)=>{ setIssue(t); setDetail({picks:[],photo:false,note:""}); setMissing([]); setMissingNote(""); setScreen(t.key==="ingredient"?"ingredients":t.key); };
  const toggleBad = (n)=> setBad(b=> b.includes(n)?b.filter(x=>x!==n):[...b,n]);
  const toggleMissing = (n)=> setMissing(m=> m.includes(n)?m.filter(x=>x!==n):[...m,n]);
  const toggleProb = (n,p)=> setIssues(prev=>{ const cur=prev[n]||[]; return {...prev,[n]:cur.includes(p)?cur.filter(x=>x!==p):[...cur,p]}; });
  const reset = ()=>{ setScreen("rate"); setRecipe(null); setIssue(null); setBad([]); setIssues({}); setDetail({picks:[],photo:false,note:""}); setMissing([]); setMissingNote(""); };
  const supplierOf = (n)=> recipe?.ingredients.find(i=>i.name===n)?.supplier;
  const emojiOf = (n)=> recipe?.ingredients.find(i=>i.name===n)?.emoji;

  const Stepper = ({total,index})=>(
    <div style={{ display:"flex", gap:6, marginTop:12 }}>
      {Array.from({length:total}).map((_,i)=>(
        <div key={i} style={{ height:4, flex:1, borderRadius:2, background:i<=index?C.lime:"rgba(255,255,255,0.25)", transition:"background 0.3s" }} />
      ))}

    <div style={phoneStyle}>

      {screen==="issue" && recipe && (
        <div style={{ height:"100%", overflowY:"auto" }}>

      )}
      {recipe && issue && ISSUE_CONFIG[issue.key] && screen===issue.key && (()=>{ const cfg=ISSUE_CONFIG[issue.key]; return (

          <div style={{ flex:1, overflowY:"auto", padding:"16px 16px" }}>
            <div style={{ fontSize:13, color:C.gray, lineHeight:1.5 }}>Add a couple of details and a photo so our team can verify it quickly.</div>
            {cfg.quick && <SectionLabel>{cfg.quick}</SectionLabel>}
            {cfg.chips.length>0 && (
              <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
                {cfg.chips.map(c=>(<Chip key={c} label={c} on={detail.picks.includes(c)} onClick={()=>setDetail(d=>({...d, picks: d.picks.includes(c)?d.picks.filter(x=>x!==c):[...d.picks,c]}))} />))}

            )}

            <PhotoTile added={detail.photo} onToggle={()=>setDetail(d=>({...d,photo:!d.photo}))} label={cfg.photoLabel} hint={cfg.photoHint}/>
            <SectionLabel>Anything to add?</SectionLabel>
            <Field value={detail.note} onChange={e=>setDetail(d=>({...d,note:e.target.value}))} placeholder="Optional: describe it in a few words." minHeight={80}/>
            <div style={{ height:8 }} />
          </div>
          <SubmitBar disabled={!detail.photo} onClick={()=>setScreen("done")} label={detail.photo?"Submit feedback":"Add a photo to submit"} />
        </div>
      ); })()}
      {screen==="done" && (
        <div style={{ height:"100%", overflowY:"auto" }}>
          <div style={{ background:`linear-gradient(160deg, ${C.green} 0%, #0F3A1C 100%)`, paddingTop:56, paddingBottom:28, paddingLeft:20, paddingRight:20, textAlign:"center" }}>
            <div style={{ width:72, height:72, borderRadius:36, background:C.lime, margin:"0 auto 14px", display:"flex", alignItems:"center", justifyContent:"center", fontSize:34, color:"white", fontWeight:900, boxShadow:"0 8px 26px rgba(141,198,63,0.5)", animation:"checkPop 0.55s cubic-bezier(0.34,1.56,0.64,1) both" }}>✓</div>
            <div style={{ color:"white", fontSize:21, fontWeight:900 }}>Thanks, Jawdee!</div>
            <div style={{ color:"rgba(255,255,255,0.75)", fontSize:13, marginTop:6, lineHeight:1.5 }}>Your feedback on <strong style={{ color:"white" }}>{recipe?.name}</strong> has been logged.</div>
          </div>
          <div style={{ padding:"16px 16px 32px" }}>
            <div style={{ fontSize:11, fontWeight:800, color:C.gray, letterSpacing:0.6, textTransform:"uppercase", marginBottom:12 }}>{issue?.key==="ingredient"?"Flagged & traced to supplier":`Reported: ${issue?.label}`}</div>
            {issue?.key==="ingredient" && bad.map(n=>(
              <div key={n} style={{ background:C.white, borderRadius:14, padding:14, marginBottom:10, boxShadow:"0 2px 8px rgba(0,0,0,0.05)" }}>
                <div style={{ display:"flex", alignItems:"center", gap:11 }}>
                  <div style={{ width:36, height:36, borderRadius:10, background:C.bg, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18 }}>{emojiOf(n)}</div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:14, fontWeight:800, color:C.black }}>{n}</div>
                    <div style={{ fontSize:11, color:C.gray }}>↳ {supplierOf(n)}</div>
                  </div>
                </div>
                {(issues[n]||[]).length>0 && (
                  <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginTop:10 }}>
                    {(issues[n]||[]).map(p=>(<span key={p} style={{ background:`${C.red}12`, color:C.red, borderRadius:14, padding:"3px 10px", fontSize:11, fontWeight:700 }}>{p}</span>))}
                  </div>
                )}
              </div>
            ))}
            {issue && issue.key==="ingredient" && (missing.length>0 || missingNote.trim()) && (
              <div style={{ background:C.white, border:`1px solid ${C.amber}55`, borderRadius:14, padding:14, marginBottom:10, boxShadow:"0 2px 8px rgba(0,0,0,0.05)" }}>
                <div style={{ fontSize:11, fontWeight:800, color:C.amber, letterSpacing:0.5, textTransform:"uppercase", marginBottom:8 }}>Missing items</div>
                {missing.length>0 && <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>{missing.map(n=>(<span key={n} style={{ background:`${C.amber}12`, color:C.amber, borderRadius:14, padding:"3px 10px", fontSize:11, fontWeight:700 }}>{n}</span>))}</div>}
                {missingNote.trim() && <div style={{ fontSize:12.5, color:C.ink, lineHeight:1.55, marginTop: missing.length>0?8:0 }}>{missingNote}</div>}
              </div>
            )}
            {issue && issue.key==="ingredient" && (()=>{ const o=compensationOutcome(recipe,bad,issues,missing); return (
              <div style={{ background:C.white, border:`1px solid ${o.color}55`, borderRadius:14, padding:16, marginBottom:10, boxShadow:"0 2px 8px rgba(0,0,0,0.05)" }}>
                <div style={{ fontSize:11, fontWeight:800, color:C.gray, letterSpacing:0.5, textTransform:"uppercase", marginBottom:8 }}>Resolution</div>
                <div style={{ display:"flex", alignItems:"center", gap:9 }}>
                  <div style={{ width:10, height:10, borderRadius:5, background:o.color, flexShrink:0 }} />
                  <div style={{ fontSize:15, fontWeight:900, color:o.color }}>{o.label}</div>
                </div>
                <div style={{ fontSize:12.5, color:C.ink, lineHeight:1.6, marginTop:8 }}>{o.note}</div>
                {o.verify && <div style={{ fontSize:11.5, color:C.amber, lineHeight:1.5, marginTop:8 }}>Higher-value credit, so it is confirmed against the supplier batch and may ask for a quick photo.</div>}
              </div>
            ); })()}
            {issue && issue.key!=="ingredient" && ISSUE_CONFIG[issue.key] && (
              <div style={{ background:C.white, border:`1px solid ${C.line}`, borderRadius:14, padding:16, marginBottom:10, boxShadow:"0 2px 8px rgba(0,0,0,0.05)" }}>
                {detail.picks.length>0 && <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:8 }}>{detail.picks.map(p=>(<span key={p} style={{ background:`${C.green}12`, color:C.green, borderRadius:14, padding:"3px 10px", fontSize:11, fontWeight:700 }}>{p}</span>))}</div>}
                <div style={{ fontSize:12.5, color:C.ink, lineHeight:1.6 }}>{detail.photo ? "Your photo was attached for faster resolution." : "No photo attached."}{detail.note ? (" Note: "+detail.note) : ""}</div>
              </div>
            )}
            <div style={{ background:C.amberBg, border:`1px solid ${C.amber}44`, borderRadius:14, padding:16, marginTop:6 }}>
              <div style={{ fontSize:11, fontWeight:800, color:C.amber, letterSpacing:0.5, textTransform:"uppercase", marginBottom:6 }}>What happens next</div>
              <div style={{ fontSize:13, color:C.black, lineHeight:1.65 }}>{issue && issue.key==="ingredient" ? <>We've sent this to our quality review team to investigate the flagged ingredient{bad.length>1?"s":""} with the supplier.</> : <>We've routed this to the team that owns {ISSUE_CONFIG[issue&&issue.key] ? ISSUE_CONFIG[issue.key].team : "this area"}, with your photo and details.</>} You'll hear back with the outcome within 3 to 5 business days.</div>
            </div>
            <button onClick={reset} style={{ width:"100%", marginTop:16, background:C.green, color:"white", border:"none", borderRadius:14, padding:"15px 0", fontSize:15, fontWeight:900, cursor:"pointer" }}>Done</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Supplier scorecard: report → batch → quality standard for producers ── */
const TIERS = [
  { name:"Meets standard", color:C.green, bg:"#EAF4E5",
    action:"Batch is within the ≤ 2% acceptable defect rate. Keep sourcing as normal." },
  { name:"On watch", color:C.amber, bg:C.amberBg,
    action:"Defect rate above standard. Auto-flagged in Intelex, supplier notified, next 2 batches monitored." },
  { name:"Corrective action required", color:C.orange, bg:"#FCEBDD",
    action:"An Intelex corrective action is opened. Supplier must submit a root-cause analysis and fix before the next batch ships." },
  { name:"Re-source / replace supplier", color:C.red, bg:"#FBEDE7",
    action:"Repeated breach of the standard. Procurement sources an alternate provider for this ingredient." },
];
const OTHER_SUPPLIERS = [
  { ing:"Salmon Fillet", emoji:"🐟", supplier:"Northern Waters Seafood, BC", rate:1.3 },
  { ing:"Bell Pepper", emoji:"🫑", supplier:"Sunrise Organics, Ontario", rate:2.7 },
  { ing:"Thai Basil", emoji:"🌿", supplier:"Greenleaf Farms, Quebec", rate:4.9 },
  { ing:"Cremini Mushrooms", emoji:"🍄", supplier:"Forest Floor Fungi, Ontario", rate:1.8 },
];
function rateToTier(r){ return r<=2 ? 0 : r<=4 ? 1 : r<=7 ? 2 : 3; }
function rateToScore(r){ return Math.max(0, Math.round(100 - Math.max(0, r-2)*9)); }
function MiniStatus({rate}){
  const t = TIERS[rateToTier(rate)];
  return <span style={{ background:t.bg, color:t.color, borderRadius:20, padding:"3px 10px", fontSize:11, fontWeight:800, whiteSpace:"nowrap" }}>{t.name}</span>;
}
function OpsScorecard(){
  const [rate,setRate] = useState(6.2);
  const BATCH = 9200;
  const tierIdx = rateToTier(rate);
  const tier = TIERS[tierIdx];
  const score = rateToScore(rate);
  const affected = Math.round(BATCH*rate/100);
  const Step = ({i})=>{
    const active = i===tierIdx, passed = i<tierIdx;
    const t = TIERS[i];
    return (
      <div style={{ display:"flex", gap:12, alignItems:"flex-start", opacity: active||passed?1:0.45 }}>
        <div style={{ width:26, height:26, borderRadius:13, flexShrink:0, background: active?t.color:(passed?C.grayLight:"transparent"), border:`2px solid ${active?t.color:C.grayLight}`, color:"#fff", display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, fontWeight:900 }}>{passed?"✓":i+1}</div>
        <div style={{ paddingBottom:14 }}>
          <div style={{ fontSize:13.5, fontWeight:800, color: active?t.color:C.ink }}>{t.name}{active && <span style={{ marginLeft:8, fontSize:11, background:t.bg, color:t.color, borderRadius:10, padding:"2px 8px" }}>current</span>}</div>
          {active && <div style={{ fontSize:12.5, color:C.gray, lineHeight:1.55, marginTop:4 }}>{t.action}</div>}
        </div>
      </div>
    );
  };
  return (
    <div style={{ maxWidth:1000, margin:"0 auto" }}>
      <div style={{ display:"flex", gap:10, flexWrap:"wrap", marginBottom:20 }}>
        {[
          ["📱","Subscriber reports","Per-ingredient, tagged, with supplier"],
          ["📊","Aggregate by batch","Defect rate per supplier per ingredient"],
          ["🎯","Score vs. standard","Auto-graded against the ≤ 2% threshold"],
          ["⚙️","Trigger action","Watch → corrective → re-source"],
        ].map((s,i)=>(
          <div key={i} style={{ flex:"1 1 180px", background:C.white, border:`1px solid ${C.line}`, borderRadius:12, padding:"12px 14px" }}>
            <div style={{ fontSize:22 }}>{s[0]}</div>
            <div style={{ fontSize:13, fontWeight:800, marginTop:4, color:C.ink }}>{i+1}. {s[1]}</div>
            <div style={{ fontSize:11.5, color:C.gray, marginTop:2, lineHeight:1.4 }}>{s[2]}</div>
          </div>
        ))}
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))", gap:16 }}>
        <div style={{ background:C.white, borderRadius:16, padding:20, boxShadow:"0 2px 12px rgba(0,0,0,.08)", border:`1px solid ${C.line}` }}>
          <div style={{ fontSize:11, fontWeight:800, color:C.gray, letterSpacing:.5, textTransform:"uppercase" }}>Live batch · simulate complaint volume</div>
          <div style={{ display:"flex", alignItems:"center", gap:11, margin:"12px 0 4px" }}>
            <div style={{ width:44, height:44, borderRadius:11, background:C.bg, display:"flex", alignItems:"center", justifyContent:"center", fontSize:22 }}>🍗</div>
            <div>
              <div style={{ fontSize:15, fontWeight:900, color:C.ink }}>Chicken Breast</div>
              <div style={{ fontSize:12, color:C.gray }}>Maplebrook Poultry, Ontario · batch #MP-2291</div>
            </div>
          </div>
          <div style={{ fontSize:12.5, color:C.gray, marginTop:10, marginBottom:6 }}>Reported quality-defect rate this batch</div>
          <input type="range" min="0" max="12" step="0.1" value={rate} onChange={e=>setRate(parseFloat(e.target.value))} style={{ width:"100%", accentColor:tier.color }} />
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginTop:4 }}>
            <div style={{ fontSize:30, fontWeight:900, color:tier.color }}>{rate.toFixed(1)}%</div>
            <div style={{ fontSize:11.5, color:C.gray }}>standard: ≤ 2.0%</div>
          </div>
          <div style={{ marginTop:14 }}>
            <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:C.gray, marginBottom:4 }}><span>Supplier quality score</span><span style={{ fontWeight:900, color:tier.color }}>{score}/100</span></div>
            <div style={{ height:10, borderRadius:6, background:C.bg, overflow:"hidden" }}>
              <div style={{ height:"100%", width:`${score}%`, background:tier.color, transition:"all .2s" }} />
            </div>
          </div>
          <div style={{ marginTop:14, background:tier.bg, borderRadius:12, padding:"12px 14px" }}><MiniStatus rate={rate}/></div>
        </div>
        <div style={{ background:C.white, borderRadius:16, padding:20, boxShadow:"0 2px 12px rgba(0,0,0,.08)", border:`1px solid ${C.line}` }}>
          <div style={{ fontSize:11, fontWeight:800, color:C.gray, letterSpacing:.5, textTransform:"uppercase", marginBottom:14 }}>Automated action ladder</div>
          {[0,1,2,3].map(i=><Step key={i} i={i}/>)}

            <div style={{ color:"#fff", fontSize:21, fontWeight:900, lineHeight:1.4, maxWidth:900 }}>Customer complaints are an untapped source of operational intelligence.</div>
            <div style={{ color:"rgba(255,255,255,.5)", fontSize:13, marginTop:8 }}>The idea this case study is built around.</div>
          </div>
        </div>
      </div>

      {/* PROBLEM */}
      <div style={{ background:C.bg, padding:"40px 0 8px" }}>
        <div className="pageWrap">
          <div style={{ display:"inline-block", background:"#FBEDE7", color:C.red, fontWeight:800, fontSize:11, letterSpacing:.6, textTransform:"uppercase", borderRadius:20, padding:"4px 12px", marginBottom:12 }}>The problem</div>
          <H2>Subscribers churn silently when quality slips</H2>
          <Lead>Repeated quality issues such as damaged ingredients, missing items, and poor produce quality can gradually erode customer trust. However, the current feedback experience appears fragmented and generates limited operational insight, making it difficult to identify and address recurring problems before customers begin skipping deliveries or canceling their subscriptions.</Lead>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))", columnGap:14 }}>
            {PROBLEM_POINTS.map((p,i)=>(<Toggle key={i} title={p[0]}>{p[1]}</Toggle>))}
          </div>
        </div>
      </div>

      {/* PHASE 2 EVIDENCE */}
      <div style={{ background:C.bg, padding:"4px 0 38px" }}>
        <div className="pageWrap">
          <div style={{ display:"inline-block", background:"rgba(30,92,46,.1)", color:C.green, fontWeight:800, fontSize:11, letterSpacing:.6, textTransform:"uppercase", borderRadius:20, padding:"4px 12px", marginBottom:12 }}>Research</div>
          <Lead>Through surveys, community discussions, and secondary research, I explored the drivers of dissatisfaction among current and former HelloFresh customers. Three themes consistently emerged. Basis: 128 survey responses, 17+ Reddit respondents and a couple of direct messages and interviews on r/hellofresh (June 2026), where 43% of the sample were already on a degraded schedule or had left.</Lead>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))", columnGap:14 }}>

            <Toggle title="7+ · ingredient quality and shrinkflation flagged"><strong style={{color:C.green}}>RC1 · quality declines, unverifiable. </strong>Wilted produce, undersized or "shredded" chicken, and wrong or missing items, concentrated in long-tenure subscribers (100 to 247 boxes). One first box arrived missing 40% of its ingredients and got only a $13 credit.</Toggle>

            <Toggle title="5+ · repeated late or damaged deliveries"><strong style={{color:C.amber}}>Phase 2 finding · delivery. </strong>Boxes arriving late or not at all (one courier missed at least one box a month), plus split, squished and leaking boxes and wrong-address drops. Reported across the USA, Australia and the UK, so it is not regional noise.</Toggle>


          </div>
        </div>
      </div>

      {/* GOAL */}
      <div style={{ background:C.bg, padding:"34px 0 40px" }}>
        <div className="pageWrap">
          <div style={{ background:`linear-gradient(135deg, ${C.green} 0%, ${C.greenMid} 100%)`, borderRadius:18, padding:"26px 26px", color:"#fff" }}>
            <div style={{ color:C.lime, fontWeight:800, fontSize:11, letterSpacing:.6, textTransform:"uppercase", marginBottom:8 }}>The goal</div>
            <div style={{ fontSize:20, fontWeight:900, lineHeight:1.4, maxWidth:840 }}>
              Explore whether a low friction, structured feedback experience could transform customer complaints into actionable operational insights while improving the overall customer experience.
            </div>
          </div>
        </div>
      </div>

      </>)}

      {page==="customer" && (<>
      {/* CUSTOMER PROTOTYPE */}
      <div style={{ background:"#1A3020", padding:"34px 0 10px" }}>
        <div className="pageWrap">
          <div style={{ display:"inline-block", background:"rgba(141,198,63,.2)", color:C.lime, fontWeight:800, fontSize:11, letterSpacing:.6, textTransform:"uppercase", borderRadius:20, padding:"4px 12px", marginBottom:12 }}>The customer experience</div>
          <h2 style={{ fontSize:22, color:"#fff", margin:"0 0 6px" }}>What HelloFresh does today vs. what I propose</h2>
          <p style={{ color:"rgba(255,255,255,.78)", fontSize:14, margin:"0 0 16px", lineHeight:1.6, maxWidth:820 }}>The customer-facing app. A subscriber reports exactly which ingredient fell short, categorizes the problem, and submits a photo for faster resolution, all without leaving the app.</p>
          <div style={{ display:"flex", gap:8, marginBottom:24, flexWrap:"wrap" }}>
            <Tab id="both" label="Side by side"/>
            <Tab id="today" label="HelloFresh today"/>
            <Tab id="mine" label="My solution"/>
          </div>
          <div className="stage">
            {(view==="both"||view==="today") && (
              <div style={{maxWidth:360}}>
                <div style={{ fontWeight:900, fontSize:15, color:"#fff", marginBottom:10 }}>How HelloFresh handles it today</div>
                <HelloFreshToday/>
              </div>
            )}
            {(view==="both"||view==="mine") && (
              <div style={{maxWidth:360}}>
                <div style={{ fontWeight:900, fontSize:15, color:C.lime, marginBottom:10 }}>My proposed solution</div>
                <IngredientFeedback/>
              </div>
            )}
          </div>
        </div>
      </div>
      <div style={{ background:"#1A3020", padding:"24px 0 38px" }}>
        <div className="pageWrap">
          <table className="cmp">
            <thead><tr><th>Dimension</th><th className="bad">HelloFresh today</th><th>My solution</th></tr></thead>
            <tbody>
              {CMP_ROWS.map((r,i)=>(
                <tr key={i}><td className="dim">{r[0]}</td><td className="bad">{r[1]}</td><td className="good">{r[2]}</td></tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* CURRENT CREDIT PROCESS */}
      <div style={{ background:C.bg, padding:"40px 0 8px" }}>
        <div className="pageWrap">
          <H2>How getting a credit works today (2026)</H2>
          <Lead>For context, this is the current HelloFresh path for turning a quality issue into money back. It is digital only, documentation gated, and discretionary, which is the experience this concept is measured against.</Lead>
          <div style={{ overflow:"hidden", borderRadius:14, border:`1px solid ${C.line}` }}>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13, background:C.white }}>
              <thead>
                <tr style={{ background:C.green, color:"#fff" }}>
                  <th style={{ textAlign:"left", padding:"10px 13px", fontSize:12 }}>If this happened</th>
                  <th style={{ textAlign:"left", padding:"10px 13px", fontSize:12 }}>Eligible?</th>
                  <th style={{ textAlign:"left", padding:"10px 13px", fontSize:12 }}>Typical outcome</th>
                </tr>
              </thead>
              <tbody>
                {[
                  ["Missing item","Yes","Account credit or full refund","good"],
                  ["Spoiled or damaged food","Yes, with photos","Account credit or partial refund","good"],
                  ["Wrong meal delivered","Yes","Full credit or refund","good"],
                  ["Late delivery, food unsafe","Case by case","Account credit or partial refund","mid"],
                  ["You did not enjoy the meal","No","No refund","bad"],
                  ["Box not skipped before the cutoff","No","No refund","bad"],
                ].map((r,i)=>(
                  <tr key={i} style={{ borderTop:`1px solid ${C.line}` }}>
                    <td style={{ padding:"10px 13px", fontWeight:700, color:C.ink }}>{r[0]}</td>
                    <td style={{ padding:"10px 13px", color: r[3]==="bad"?C.red:(r[3]==="mid"?C.amber:C.green), fontWeight:800, whiteSpace:"nowrap" }}>{r[1]}</td>
                    <td style={{ padding:"10px 13px", color:C.gray }}>{r[2]}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{ background:C.white, border:`1px solid ${C.line}`, borderRadius:14, padding:"14px 16px", marginTop:14, fontSize:13, color:C.ink, lineHeight:1.65 }}>
            <strong>The friction:</strong> report within 7 days with timestamped photos, through chat, phone, the Help Center form, or email. Credits post quickly, but card refunds take 5 to 10 business days. Denials and slow credits are common, and some claims are marked resolved without the credit ever posting, which pushes users toward chargebacks, the BBB, or Trustpilot (1.3 stars).
          </div>
          <div style={{ fontSize:11.5, color:C.gray, marginTop:8 }}>Source: Pine AI, HelloFresh refund policy (March 2026); HelloFresh Help Center.</div>
        </div>
      </div>

      {/* COMPENSATION LOGIC */}
      <div style={{ background:C.bg, padding:"36px 0 8px" }}>
        <div className="pageWrap">
          <H2>The proposed compensation logic</H2>
          <Lead>Rather than one flat goodwill credit, the outcome scales with how much the failure actually broke the meal. The subscriber still just taps the bad ingredient; the system decides the tier behind the scenes.</Lead>
          <div style={{ display:"grid", gridTemplateColumns:"minmax(96px,130px) 1fr 1fr", gap:10 }}>
            <div></div>
            <div style={{ background:C.green, color:"#fff", fontWeight:800, fontSize:12, padding:"10px 12px", borderRadius:10, textAlign:"center" }}>Unusable (missing / spoiled)</div>
            <div style={{ background:C.green, color:"#fff", fontWeight:800, fontSize:12, padding:"10px 12px", borderRadius:10, textAlign:"center" }}>Degraded but usable</div>

            <div style={{ background:"#EAEFE6", color:C.green, fontWeight:800, fontSize:12.5, padding:"12px", borderRadius:10, display:"flex", alignItems:"center" }}>Critical to the dish</div>
            <div style={{ background:"#EAF4E5", border:`1px solid ${C.green}33`, borderRadius:10, padding:"12px 14px" }}>
              <div style={{ fontSize:14, fontWeight:900, color:C.green }}>Full meal credit</div>
              <div style={{ fontSize:11.5, color:C.gray, marginTop:4, lineHeight:1.5 }}>HelloFresh-style. The dish cannot be cooked, so the whole meal is covered.</div>
            </div>
            <div style={{ background:"#FEF3E2", border:`1px solid ${C.amber}33`, borderRadius:10, padding:"12px 14px" }}>
              <div style={{ fontSize:14, fontWeight:900, color:C.amber }}>Partial credit</div>
              <div style={{ fontSize:11.5, color:C.gray, marginTop:4, lineHeight:1.5 }}>Key item below standard but still usable.</div>
            </div>

            <div style={{ background:"#EAEFE6", color:C.green, fontWeight:800, fontSize:12.5, padding:"12px", borderRadius:10, display:"flex", alignItems:"center" }}>Supporting ingredient</div>
            <div style={{ background:"#EAF4E5", border:`1px solid ${C.greenMid}33`, borderRadius:10, padding:"12px 14px" }}>
              <div style={{ fontSize:14, fontWeight:900, color:C.greenMid }}>Micro-credit</div>
              <div style={{ fontSize:11.5, color:C.gray, marginTop:4, lineHeight:1.5 }}>Credited at the ingredient's value; the dish was still cookable.</div>
            </div>
            <div style={{ background:"#EFEDE8", border:`1px solid ${C.line}`, borderRadius:10, padding:"12px 14px" }}>
              <div style={{ fontSize:14, fontWeight:900, color:C.gray }}>Logged, no credit</div>
              <div style={{ fontSize:11.5, color:C.gray, marginTop:4, lineHeight:1.5 }}>Acknowledged and routed to the right team.</div>
            </div>
          </div>
          <div style={{ background:C.white, border:`1px solid ${C.line}`, borderRadius:14, padding:"14px 16px", marginTop:14, fontSize:13, color:C.ink, lineHeight:1.65 }}>
            <strong>Escalation and guardrails:</strong> if several supporting ingredients fail together, or two or more critical ones, the outcome escalates to a full meal credit. The full-meal tier, the expensive one, is confirmed against the supplier batch and may request a photo, so the cheap path stays frictionless while the costly path stays fraud-resistant. Flag an ingredient in <strong>My solution</strong> above to see the resulting outcome on the confirmation screen.
          </div>
        </div>
      </div>

      {/* WHAT MAKES IT DIFFERENT */}
      <div style={{ background:C.bg, padding:"40px 0" }}>
        <div className="pageWrap">
          <H2>What makes the solution different</H2>
          <Lead>Three properties turn a complaint into something the business can act on.</Lead>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))", columnGap:14 }}>
            {PILLARS.map((p,i)=>(<Toggle key={i} title={p[0]+"  "+p[1]}>{p[2]}</Toggle>))}
          </div>
        </div>
      </div>

      </>)}

      {page==="back" && (<>
      {/* BACK END INTRO + TIERS */}
      <div style={{ background:C.bg, padding:"40px 0 8px" }}>
        <div className="pageWrap">
          <div style={{ display:"inline-block", background:"rgba(30,92,46,.1)", color:C.green, fontWeight:800, fontSize:11, letterSpacing:.6, textTransform:"uppercase", borderRadius:20, padding:"4px 12px", marginBottom:12 }}>Back end · operations</div>
          <H2>Turning reports into accountability and fair credit</H2>
          <Lead>On the back end, every report and its photo flows through two tiers, and the same data rolls up to hold suppliers and distributors accountable.</Lead>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))", gap:16 }}>
            <div onClick={()=>{ const e=document.getElementById("tier1"); if(e) e.scrollIntoView({behavior:"smooth"}); }} style={{ background:C.white, border:`1px solid ${C.green}44`, borderRadius:16, padding:20, cursor:"pointer" }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}><span style={{ background:C.green, color:"#fff", borderRadius:8, padding:"2px 10px", fontSize:12, fontWeight:900 }}>Tier 1</span><span style={{ fontSize:15, fontWeight:900, color:C.green }}>AI triage</span></div>
              <div style={{ fontSize:13, color:C.ink, lineHeight:1.65 }}>AI validates the photo against the claim, checks corroboration across tickets and the reporting history of the user, then auto-approves clear cases (micro or full credit) and flags the rest. No agent touches a routine claim.</div>
              <div style={{ fontSize:11.5, fontWeight:800, color:C.green, marginTop:10 }}>View Tier 1 \u2193</div>
            </div>
            <div onClick={()=>{ const e=document.getElementById("tier2"); if(e) e.scrollIntoView({behavior:"smooth"}); }} style={{ background:C.white, border:`1px solid ${C.amber}55`, borderRadius:16, padding:20, cursor:"pointer" }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}><span style={{ background:C.amber, color:"#fff", borderRadius:8, padding:"2px 10px", fontSize:12, fontWeight:900 }}>Tier 2</span><span style={{ fontSize:15, fontWeight:900, color:C.amber }}>Operations team review</span></div>
              <div style={{ fontSize:13, color:C.ink, lineHeight:1.65 }}>Only AI-flagged tickets reach a human: missing photos, low confidence, high-risk profiles, or possible manipulation. The Operations team makes the final credit decision on these edge cases.</div>
              <div style={{ fontSize:11.5, fontWeight:800, color:C.amber, marginTop:10 }}>View Tier 2 \u2193</div>
            </div>
          </div>
        </div>
      </div>

      {/* TIER 1 AI REVIEW */}
      <div id="tier1" style={{ background:"#1A3020", padding:"34px 0 36px", scrollMarginTop:64 }}>
        <div className="pageWrap">
          <div style={{ fontWeight:900, fontSize:15, color:C.lime, marginBottom:4 }}>Tier 1 · AI review</div>
          <p style={{ color:"rgba(255,255,255,.6)", fontSize:13.5, margin:"0 0 18px", lineHeight:1.6, maxWidth:820 }}>Each request is auto-assessed. Anything the AI cannot clear is flagged for a Tier 2 review by the Operations team. Tap a request to see the reasoning.</p>
          <AIReview/>
        </div>
      </div>

      {/* TIER 2 OPERATIONS REVIEW */}
      <div id="tier2" style={{ background:C.bg, padding:"34px 0 36px", scrollMarginTop:64 }}>
        <div className="pageWrap">
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}><span style={{ background:C.amber, color:"#fff", borderRadius:8, padding:"2px 10px", fontSize:12, fontWeight:900 }}>Tier 2</span><div style={{ fontWeight:900, fontSize:15, color:C.amber }}>Operations team review</div></div>
          <p style={{ color:C.gray, fontSize:13.5, margin:"0 0 18px", lineHeight:1.6, maxWidth:820 }}>Only the requests the AI flagged land here. A human reviews the evidence and makes the final credit decision.</p>
          <Tier2Review/>
        </div>
      </div>

      {/* SUPPLIER SCORECARD */}
      <div style={{ background:C.bg, padding:"8px 0 44px" }}>
        <div className="pageWrap">
          <H2>Connecting feedback to supplier performance</H2>
          <Lead>One opportunity uncovered during this exploration was the possibility of connecting customer feedback directly to supplier performance. The scorecard below illustrates how ingredient level reports could be aggregated into supplier quality signals and used to inform operational decisions. Drag the slider to explore how a single batch could cross the threshold.</Lead>
          <OpsScorecard/>
        </div>
      </div>

      {/* OPS METRICS */}
      <div style={{ background:"#1A3020", padding:"12px 0 38px" }}>
        <div className="pageWrap">
          <div style={{ fontWeight:900, fontSize:15, color:C.lime, marginBottom:4 }}>Operations metrics</div>
          <p style={{ color:"rgba(255,255,255,.6)", fontSize:13.5, margin:"0 0 18px", lineHeight:1.6, maxWidth:820 }}>Thousands of these tickets rolled up for the business.</p>
          <OpsMetrics/>
        </div>
      </div>

      {/* BUSINESS CASE */}
      <div style={{ background:"#1A3020", padding:"42px 0" }}>
        <div className="pageWrap">
          <div style={{ display:"inline-block", background:"rgba(141,198,63,.2)", color:C.lime, fontWeight:800, fontSize:11, letterSpacing:.6, textTransform:"uppercase", borderRadius:20, padding:"4px 12px", marginBottom:12 }}>The business case</div>
          <h2 style={{ fontSize:22, color:"#fff", margin:"0 0 6px" }}>What it costs today, and how this could support retention</h2>
          <p style={{ color:"rgba(255,255,255,.6)", fontSize:14, margin:"0 0 22px", lineHeight:1.6, maxWidth:820 }}>Figures below are from public research; where HelloFresh does not disclose a number, the estimate and its basis are stated.</p>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))", columnGap:14 }}>
          <Toggle title="The cost of the current model" dark>In 95%+ of cases HelloFresh resolves issues with a discretionary account credit, with no published formula. Quality and service credits are not broken out, but on ~$8.25B revenue an estimated ~1% (<strong>~$80M+ a year</strong>) is a realistic order of magnitude, larger than 2024's near-zero / slightly negative operating margin. Most credits are absorbed, not recovered, because a complaint never reaches the supplier batch.</Toggle>
          <Toggle title="Who they are losing" dark>Public reviews cluster on three things this solution captures: <strong>quality</strong> (protein and produce freshness), <strong>delivery</strong> (late boxes, melted ice, warm meat), and <strong>damage</strong>. The signal is severe: 1.3★ on Trustpilot and 1,800+ BBB complaints in three years, led by refund denials, slow credits and unresolved issues.</Toggle>
          <Toggle title="How this could support retention" dark>If implemented successfully, this approach could contribute to improved retention by reducing repeat quality incidents and increasing customer confidence in the feedback process. Cost could also shift toward the at-fault supplier rather than being absorbed as blanket credits.</Toggle>
          </div>
        </div>
      </div>

      </>)}

      {page==="impact" && (<>
      {/* IMPACT / HOW IT HELPS */}
      <div style={{ background:`linear-gradient(150deg, ${C.green} 0%, #0F3A1C 100%)`, color:"#fff", padding:"44px 20px 36px" }}>
        <div style={{ maxWidth:1180, margin:"0 auto" }}>
          <div style={{ color:C.lime, fontWeight:800, letterSpacing:1, textTransform:"uppercase", fontSize:11.5, marginBottom:10 }}>Outcome · closing the loop</div>
          <h1 style={{ margin:"0 0 12px", fontSize:28, lineHeight:1.2 }}>How this solves the problem</h1>
          <p style={{ margin:0, color:"rgba(255,255,255,.85)", fontSize:15, lineHeight:1.6, maxWidth:860 }}>The case study set out to address <strong>RC1, ingredient quality declines and is unverifiable by the subscriber</strong>. By turning each complaint into structured, supplier-traceable data, the same solution also improves <strong>RC3</strong>, because the value subscribers feel grows when quality is visibly fixed and credits are fair.</p>
        </div>
      </div>
      <div style={{ background:C.bg, padding:"38px 0 50px" }}>
        <div className="pageWrap">
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))", gap:16 }}>
            {[
              ["🎯","Directly addresses RC1","Quality that used to decline silently and unverifiably is now reported per ingredient and traced to the supplier batch, so it can be verified and fixed at the source."],
              ["📈","Also improves RC3","The insights from this data identify the contributors that affect meal quality and let the business act to control them, so subscribers feel the value of what they pay for."],
              ["🔍","Identifies what drives quality issues","Aggregated reports pinpoint the suppliers, batches and ingredients behind dissatisfaction, triggering corrective operational actions that uphold quality standards."],
              ["⚡","Makes reporting hassle-free","One tap, in-app, with a photo for faster resolution. It serves exactly the audience that voiced dissatisfaction about ingredient quality, damaged items and missing items."],
              ["🧾","Accounts for credits and their root causes","Every credit is tied to a validated reason, giving the business a structured way to account for what was given and the root cause behind it."],
              ["🤖","Tiered triage keeps it efficient","Level 1 AI filters tickets and resolves the clear, definable cases, while complex tickets route to the support team for a final decision."],
            ].map((d,i)=>(
              <div key={i} style={{ background:C.white, border:`1px solid ${C.line}`, borderRadius:16, padding:20 }}>
                <div style={{ fontSize:26 }}>{d[0]}</div>
                <div style={{ fontSize:15.5, fontWeight:900, color:C.green, margin:"8px 0 8px" }}>{d[1]}</div>
                <div style={{ fontSize:13, color:C.ink, lineHeight:1.65 }}>{d[2]}</div>
              </div>
            ))}
          </div>
          <div style={{ background:`linear-gradient(135deg, ${C.green} 0%, ${C.greenMid} 100%)`, borderRadius:18, padding:"24px 26px", color:"#fff", marginTop:20 }}>
            <div style={{ color:C.lime, fontWeight:800, fontSize:11, letterSpacing:.6, textTransform:"uppercase", marginBottom:8 }}>In short</div>
            <div style={{ fontSize:18, fontWeight:900, lineHeight:1.45, maxWidth:880 }}>Customer complaints become operational intelligence: subscribers report quality, delivery and damage in seconds, the business sees the root causes and acts on them, and every credit is fair and accounted for, which protects the trust that keeps subscribers from churning.</div>
          </div>
        </div>
      </div>
      </>)}

      <div style={{ background:C.bg, padding:"22px 0 30px", textAlign:"center", color:C.gray, fontSize:12, lineHeight:1.6 }}>
        Hello PM Phase 3. George Innasi, June 2026 · Research sources: HelloFresh Help Center, Chattermill, Intelex, Trustpilot, BBB, HelloFresh SE annual reports.
      </div>
      <style>{STYLES}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
